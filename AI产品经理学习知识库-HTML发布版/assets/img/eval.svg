      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17202a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="#f6f7fb"/>
  <rect x="34" y="34" width="892" height="472" rx="8" fill="url(#panel)" stroke="#d8dee8" filter="url(#shadow)"/>
  <text x="68" y="86" font-family="Arial, 'PingFang SC', sans-serif" font-size="28" font-weight="800" fill="#17202a">Eval 质量系统</text>
  <text x="68" y="122" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#667085">样本集、评分维度、回归集和线上反馈组成闭环</text>
  
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="108" y="172" width="160" height="74" rx="8" fill="#eef2ff" stroke="#2563eb"/>
